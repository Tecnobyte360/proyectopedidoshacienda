; ============================================================
; 📞 Kivox IVR — Configuración SIP (PJSIP)
; ============================================================
; Esto define cómo Asterisk se conecta a tu proveedor de DID
; (Twilio, Voxbeam, DIDWW, etc.) y cómo enruta llamadas internas.

; -----------------------------------------------------------
; TRANSPORTE — escucha en todas las interfaces
; -----------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; external_media_address y external_signaling_address
; los DEBES llenar con la IP pública de tu VPS:
; external_media_address=185.XXX.XXX.XXX
; external_signaling_address=185.XXX.XXX.XXX
; local_net=10.0.0.0/8

; -----------------------------------------------------------
; TRUNK TWILIO (cámbialo si usas Voxbeam/DIDWW/etc.)
; -----------------------------------------------------------
[twilio-out]
type=registration
outbound_auth=twilio-auth
server_uri=sip:colombia.pstn.twilio.com
client_uri=sip:TU_USUARIO_TWILIO@colombia.pstn.twilio.com
retry_interval=60

[twilio-auth]
type=auth
auth_type=userpass
username=TU_USUARIO_TWILIO
password=TU_PASSWORD_TWILIO

[twilio-aor]
type=aor
contact=sip:colombia.pstn.twilio.com

[twilio-endpoint]
type=endpoint
context=from-twilio
disallow=all
allow=ulaw,alaw
outbound_auth=twilio-auth
aors=twilio-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[twilio-identify]
type=identify
endpoint=twilio-endpoint
match=colombia.pstn.twilio.com

; -----------------------------------------------------------
; EXTENSIÓN INTERNA (opcional) — para que un operador humano
; reciba llamadas transferidas desde el IVR.
; -----------------------------------------------------------
[operador-hacienda]
type=endpoint
context=internal
disallow=all
allow=ulaw,alaw
auth=operador-hacienda-auth
aors=operador-hacienda-aor

[operador-hacienda-auth]
type=auth
auth_type=userpass
username=operador-hacienda
password=CAMBIA_ESTE_PASSWORD_SEGURO

[operador-hacienda-aor]
type=aor
max_contacts=1
