; ============================================================
; 📞 Kivox IVR — Configuración SIP (PJSIP)
; ============================================================
; Esto define cómo Asterisk se conecta a tu proveedor de DID
; (Twilio, Voxbeam, DIDWW, etc.) y cómo enruta llamadas internas.

; -----------------------------------------------------------
; TRANSPORTE — escucha en todas las interfaces
; -----------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; external_media_address y external_signaling_address
; los DEBES llenar con la IP pública de tu VPS:
; external_media_address=185.XXX.XXX.XXX
; external_signaling_address=185.XXX.XXX.XXX
; local_net=10.0.0.0/8

; -----------------------------------------------------------
; TRUNK TWILIO (cámbialo si usas Voxbeam/DIDWW/etc.)
; -----------------------------------------------------------
[twilio-out]
type=registration
outbound_auth=twilio-auth
server_uri=sip:colombia.pstn.twilio.com
client_uri=sip:TU_USUARIO_TWILIO@colombia.pstn.twilio.com
retry_interval=60

[twilio-auth]
type=auth
auth_type=userpass
username=TU_USUARIO_TWILIO
password=TU_PASSWORD_TWILIO

[twilio-aor]
type=aor
contact=sip:colombia.pstn.twilio.com

[twilio-endpoint]
type=endpoint
context=from-twilio
disallow=all
allow=ulaw,alaw
outbound_auth=twilio-auth
aors=twilio-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[twilio-identify]
type=identify
endpoint=twilio-endpoint
match=colombia.pstn.twilio.com

; -----------------------------------------------------------
; EXTENSIÓN INTERNA (opcional) — para que un operador humano
; reciba llamadas transferidas desde el IVR.
; -----------------------------------------------------------
[operador-hacienda]
type=endpoint
context=internal
disallow=all
allow=ulaw,alaw
auth=operador-hacienda-auth
aors=operador-hacienda-aor

[operador-hacienda-auth]
type=auth
auth_type=userpass
username=operador-hacienda
password=CAMBIA_ESTE_PASSWORD_SEGURO

[operador-hacienda-aor]
type=aor
max_contacts=1

; -----------------------------------------------------------
; 🧪 EXTENSIONES LOCALES DE PRUEBA (solo desarrollo)
; -----------------------------------------------------------
; Configura tu softphone (Linphone/MicroSIP) con estas credenciales:
;   Usuario:  6001   (o 6002)
;   Password: test123
;   Servidor: localhost (si Asterisk corre en Docker Desktop con host network)
;             o la IP de tu PC en la LAN
;   Puerto:   5060
;
; Luego marca:
;   100 → entra al IVR de Hacienda (para probar el flow)
;   6002 → llama directo a la otra extensión

[test-6001]
type=endpoint
context=test-local
disallow=all
allow=ulaw,alaw,opus
auth=test-6001-auth
aors=test-6001-aor

[test-6001-auth]
type=auth
auth_type=userpass
username=6001
password=test123

[test-6001-aor]
type=aor
max_contacts=2
qualify_frequency=60

[test-6002]
type=endpoint
context=test-local
disallow=all
allow=ulaw,alaw,opus
auth=test-6002-auth
aors=test-6002-aor

[test-6002-auth]
type=auth
auth_type=userpass
username=6002
password=test123

[test-6002-aor]
type=aor
max_contacts=2
qualify_frequency=60
