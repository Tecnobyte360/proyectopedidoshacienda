; ============================================================
; 📞 Kivox IVR — Dialplan
; ============================================================
;
; Cuando entra una llamada por el trunk Twilio, va al contexto
; [from-twilio]. Ese contexto delega al IVR principal.
;
; El IVR llama a scripts AGI (PHP) que consultan la BD de Kivox
; vía API HTTPS para personalizar la respuesta por número.

[globals]
KIVOX_API_URL=https://admin.kivox.co/api/v1/ivr
KIVOX_API_KEY=CAMBIA_ESTO_POR_LA_API_KEY_REAL

; ============================================================
; ENTRADA — desde Twilio
; ============================================================
[from-twilio]
exten => _X.,1,NoOp(📞 Llamada entrante de ${CALLERID(num)} → DID ${EXTEN})
 same => n,Set(CDR(userfield)=ivr_inbound)
 same => n,Answer()
 same => n,Wait(1)
 ; Registrar la llamada en Kivox (no bloquea)
 same => n,AGI(registrar_llamada.php,${CALLERID(num)},${EXTEN},${UNIQUEID})
 ; Ir al IVR principal
 same => n,Goto(ivr-hacienda,s,1)

; ============================================================
; IVR PRINCIPAL — Menú "Alimentos La Hacienda"
; ============================================================
[ivr-hacienda]
exten => s,1,NoOp(IVR Hacienda — menú principal)
 same => n,Set(TIMEOUT(digit)=5)
 same => n,Set(TIMEOUT(response)=10)
 same => n,Set(INTENTOS=0)

; Etiqueta a la que volvemos si la opción es inválida
exten => s,n(reproducir),Background(custom/bienvenida_hacienda)
 same => n,WaitExten(7)

; Opciones
exten => 1,1,Goto(ivr-estado-pedido,s,1)   ; Estado de pedido
exten => 2,1,Goto(ivr-horarios,s,1)         ; Horarios y sedes
exten => 3,1,Goto(ivr-asesor,s,1)           ; Hablar con asesor
exten => 0,1,Hangup()                       ; Colgar

; Opción inválida → reintenta hasta 3 veces
exten => i,1,Set(INTENTOS=$[${INTENTOS} + 1])
 same => n,GotoIf($[${INTENTOS} > 2]?despedir)
 same => n,Playback(custom/opcion_invalida)
 same => n,Goto(s,reproducir)
 same => n(despedir),Playback(custom/despedida_invalida)
 same => n,Hangup()

; Timeout → reintenta
exten => t,1,Set(INTENTOS=$[${INTENTOS} + 1])
 same => n,GotoIf($[${INTENTOS} > 2]?despedir)
 same => n,Playback(custom/no_se_detecto_opcion)
 same => n,Goto(s,reproducir)
 same => n(despedir),Playback(custom/despedida_timeout)
 same => n,Hangup()

; ============================================================
; SUB-IVR: Estado de pedido (con AGI que consulta Kivox)
; ============================================================
[ivr-estado-pedido]
exten => s,1,NoOp(Consulta estado pedido para ${CALLERID(num)})
 same => n,AGI(consultar_pedido.php,${CALLERID(num)})
 ; consultar_pedido.php reproduce el resultado vía say o stream_file
 same => n,Wait(1)
 same => n,Playback(custom/algo_mas)
 same => n,WaitExten(5)

exten => 1,1,Goto(ivr-hacienda,s,1)  ; sí, menú principal
exten => 2,1,Hangup()                ; no, colgar
exten => t,1,Hangup()
exten => i,1,Hangup()

; ============================================================
; SUB-IVR: Horarios y sedes
; ============================================================
[ivr-horarios]
exten => s,1,NoOp(Reproducir horarios)
 same => n,Playback(custom/horarios_sedes)
 same => n,Wait(1)
 same => n,Playback(custom/algo_mas)
 same => n,WaitExten(5)

exten => 1,1,Goto(ivr-hacienda,s,1)
exten => 2,1,Hangup()
exten => t,1,Hangup()
exten => i,1,Hangup()

; ============================================================
; SUB-IVR: Transferir a asesor humano
; ============================================================
[ivr-asesor]
exten => s,1,NoOp(Transferir a operador humano)
 same => n,Playback(custom/transfiriendo)
 ; Marca al operador interno (extensión SIP) o a un celular externo via trunk
 same => n,Dial(PJSIP/operador-hacienda,30,tT)
 ; Si no contesta, deja mensaje
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?colgar)
 same => n,Playback(custom/asesor_no_disponible)
 same => n,AGI(guardar_voicemail.php,${CALLERID(num)})
 same => n(colgar),Hangup()

; ============================================================
; CONTEXTO INTERNO — para extensiones SIP del operador
; ============================================================
[internal]
exten => _X.,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()
