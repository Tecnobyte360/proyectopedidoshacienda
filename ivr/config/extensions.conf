[globals]
KIVOX_API_URL=https://admin.kivox.co/api/v1
KIVOX_API_KEY=ebe062bbf769730f9b609ffdf472aac453ca54fce87af098ebf3dcd3e8418e90

[test-local]
exten => 100,1,NoOp(Test IVR desde ${CALLERID(num)})
 same => n,System(curl -sS -m 5 -X POST -H "X-API-KEY: ${KIVOX_API_KEY}" -H "Content-Type: application/json" -d '{"caller_id":"${CALLERID(num)}","did":"100","unique_id":"${UNIQUEID}"}' ${KIVOX_API_URL}/ivr/llamadas/registrar)
 same => n,Goto(ivr-hacienda,s,1)

exten => _600X,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

exten => 200,1,System(curl -sS -m 5 -X POST -H "X-API-KEY: ${KIVOX_API_KEY}" -H "Content-Type: application/json" -d '{"caller_id":"${CALLERID(num)}","did":"200-echo","unique_id":"${UNIQUEID}"}' ${KIVOX_API_URL}/ivr/llamadas/registrar)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Echo()
 same => n,Hangup()

[ivr-hacienda]
exten => s,1,Answer()
 same => n,Wait(1)
 same => n,Set(TIMEOUT(digit)=5)
 same => n,Set(TIMEOUT(response)=10)
 same => n,Set(INTENTOS=0)

exten => s,n(reproducir),Background(custom/bienvenida)
 same => n,WaitExten(10)

exten => 1,1,System(curl -sS -m 5 -X POST -H "X-API-KEY: ${KIVOX_API_KEY}" -H "Content-Type: application/json" -d '{"unique_id":"${UNIQUEID}","evento":"opcion_elegida","opcion":"1"}' ${KIVOX_API_URL}/ivr/llamadas/evento)
 same => n,Goto(ivr-estado-pedido,s,1)
exten => 2,1,System(curl -sS -m 5 -X POST -H "X-API-KEY: ${KIVOX_API_KEY}" -H "Content-Type: application/json" -d '{"unique_id":"${UNIQUEID}","evento":"opcion_elegida","opcion":"2"}' ${KIVOX_API_URL}/ivr/llamadas/evento)
 same => n,Goto(ivr-horarios,s,1)
exten => 3,1,System(curl -sS -m 5 -X POST -H "X-API-KEY: ${KIVOX_API_KEY}" -H "Content-Type: application/json" -d '{"unique_id":"${UNIQUEID}","evento":"opcion_elegida","opcion":"3"}' ${KIVOX_API_URL}/ivr/llamadas/evento)
 same => n,Goto(ivr-asesor,s,1)
exten => 0,1,Playback(custom/despedida_timeout)
 same => n,Hangup()

exten => i,1,Set(INTENTOS=$[${INTENTOS} + 1])
 same => n,GotoIf($[${INTENTOS} > 2]?despedir)
 same => n,Playback(custom/opcion_invalida)
 same => n,Goto(s,reproducir)
 same => n(despedir),Playback(custom/despedida_invalida)
 same => n,Hangup()

exten => t,1,Set(INTENTOS=$[${INTENTOS} + 1])
 same => n,GotoIf($[${INTENTOS} > 2]?despedir)
 same => n,Playback(custom/no_se_detecto)
 same => n,Goto(s,reproducir)
 same => n(despedir),Playback(custom/despedida_timeout)
 same => n,Hangup()

[ivr-estado-pedido]
exten => s,1,Playback(custom/transfiriendo)
 same => n,SayDigits(${CALLERID(num)})
 same => n,Wait(1)
 same => n,Playback(custom/algo_mas)
 same => n,WaitExten(5)
exten => 1,1,Goto(ivr-hacienda,s,1)
exten => 2,1,Hangup()
exten => t,1,Hangup()
exten => i,1,Hangup()

[ivr-horarios]
exten => s,1,Playback(custom/horarios_sedes)
 same => n,Wait(1)
 same => n,Playback(custom/algo_mas)
 same => n,WaitExten(5)
exten => 1,1,Goto(ivr-hacienda,s,1)
exten => 2,1,Hangup()
exten => t,1,Hangup()
exten => i,1,Hangup()

[ivr-asesor]
exten => s,1,Playback(custom/transfiriendo)
 same => n,Dial(PJSIP/6002,20,tT)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?colgar)
 same => n,Playback(custom/asesor_no_disponible)
 same => n(colgar),Hangup()
